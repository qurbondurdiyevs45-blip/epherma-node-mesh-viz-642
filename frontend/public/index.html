<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>EphermaNode Mesh Viz | Transient Failure Heat-Map</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-glow: rgba(0, 255, 170, 0.15);
            --status-ok: #238636;
            --status-warn: #d29922;
            --status-fail: #f85149;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            overflow: hidden;
        }

        #app-root {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        header {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--surface-color);
            border-bottom: 1px solid #30363d;
            z-index: 10;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #00ffaa;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .status-bar {
            margin-left: auto;
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .main-viewport {
            position: relative;
            flex-grow: 1;
            background: radial-gradient(circle at center, #1c2128 0%, #0d1117 100%);
            overflow: hidden;
        }

        /* The WebGL Canvas element for high-performance rendering */
        #gl-canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .overlay-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .metric-card {
            pointer-events: auto;
            margin-bottom: 12px;
        }

        .metric-card h3 {
            margin: 0 0 4px 0;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Courier New', Courier, monospace;
        }

        footer {
            height: 30px;
            background: var(--surface-color);
            border-top: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            z-index: 10;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            background: #30363d;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div id="app-root">
        <header>
            <div class="logo">EphermaNode <span style="color: #fff;">Mesh Viz</span></div>
            <div class="status-bar">
                <div>INGRESS: <span style="color: var(--status-ok)">ACTIVE</span></div>
                <div>NODES: <span id="node-count">--</span></div>
                <div>LATENCY: <span id="avg-latency">--</span>ms</div>
            </div>
        </header>

        <main class="main-viewport">
            <canvas id="gl-canvas"></canvas>
            
            <div class="overlay-ui">
                <div class="metric-card">
                    <h3>24h Failure Rate</h3>
                    <div class="metric-value" id="failure-metric">0.00%</div>
                </div>
                <div class="metric-card">
                    <h3>Transient Drift</h3>
                    <div class="metric-value" id="drift-metric" style="color: var(--status-warn);">0.0ms</div>
                </div>
                <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 20px;">
                    LEFT CLICK: ORBIT<br>
                    RIGHT CLICK: PAN<br>
                    SCROLL: ZOOM
                </div>
            </div>
        </main>

        <footer>
            <div>Engine: WebGL 2.0 / Hardware Accelerated</div>
            <div>
                Stack: Polyglot Observability
                <span class="badge">Rust</span>
                <span class="badge">Go</span>
                <span class="badge">Zig</span>
                <span class="badge">C++</span>
            </div>
        </footer>
    </div>

    <!-- The application bundle is injected here by the build system -->
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
